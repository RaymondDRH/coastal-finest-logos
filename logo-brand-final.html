<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest Detailing — Brand Mark Final</title>
<style>
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2'); font-weight: 600; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Regular.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2'); font-weight: 300; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2'); font-weight: 200; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060C18;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  font-family: 'Clash Display', sans-serif;
}
.label {
  font-size: 9px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
  color: #3A5070; padding: 10px 0 4px; width: 900px;
}
.card-black { width: 900px; background: #000000; display: flex; align-items: center; justify-content: center; padding: 80px 80px; }
.card-navy  { width: 900px; background: #080F1E; display: flex; align-items: center; justify-content: center; padding: 80px 80px; }
.card-light { width: 900px; background: #F0EDE8; display: flex; align-items: center; justify-content: center; padding: 80px 80px; }

/* ─── LOGO PRINCIPAL ─── */
.logo {
  display: flex; flex-direction: column; align-items: center;
  line-height: 1; gap: 0;
}
.line1 { display: flex; align-items: baseline; }

/* Letter-spacing en em → escala proporcionalmente al font-size */
.coastal-w   { font-family: 'Clash Display'; font-weight: 300; font-size: 58px; letter-spacing: -0.02em; color: #FFFFFF; }
.finest-w    { font-family: 'Clash Display'; font-weight: 700; font-size: 58px; letter-spacing: -0.02em; color: #FFFFFF; }
.detailing-w { font-family: 'Clash Display'; font-weight: 300; font-size: 100px; letter-spacing: -0.03em; color: #FFFFFF; line-height: 0.9; }

.coastal-d   { font-family: 'Clash Display'; font-weight: 300; font-size: 58px; letter-spacing: -0.02em; color: #080F1E; }
.finest-d    { font-family: 'Clash Display'; font-weight: 700; font-size: 58px; letter-spacing: -0.02em; color: #080F1E; }
.detailing-d { font-family: 'Clash Display'; font-weight: 300; font-size: 100px; letter-spacing: -0.03em; color: #080F1E; line-height: 0.9; }

/* ─── LOGO COMPACT ─── */
.logo-compact { display: flex; align-items: center; gap: 20px; }
.compact-left { display: flex; flex-direction: column; align-items: flex-start; }
.compact-coastal   { font-family: 'Clash Display'; font-weight: 300; font-size: 18px; letter-spacing: -0.02em; color: #FFFFFF; line-height: 1; }
.compact-finest    { font-family: 'Clash Display'; font-weight: 700; font-size: 18px; letter-spacing: -0.02em; color: #FFFFFF; line-height: 1; }
.compact-vline     { width: 1px; height: 36px; background: rgba(255,255,255,0.2); }
.compact-detailing { font-family: 'Clash Display'; font-weight: 300; font-size: 32px; letter-spacing: -0.02em; color: #FFFFFF; line-height: 1; }

/* ─── MONOGRAMA CF — Opción B: reglas horizontales ─── */
.card-mono-row { width: 900px; display: flex; gap: 3px; }
.mono-card {
  flex: 1; background: #000000;
  display: flex; align-items: center; justify-content: center;
  padding: 48px 32px;
}
.mono-card.navy  { background: #080F1E; }
.mono-card.light { background: #F0EDE8; }

.monogram-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.mono-rule { width: 100%; height: 1px; background: #FFFFFF; }
.mono-rule-dark { width: 100%; height: 1px; background: #080F1E; }

.mono-cf {
  font-family: 'Clash Display'; font-weight: 700; font-size: 64px;
  letter-spacing: -0.03em; color: #FFFFFF; line-height: 1;
}
.mono-cf-dark {
  font-family: 'Clash Display'; font-weight: 700; font-size: 64px;
  letter-spacing: -0.03em; color: #080F1E; line-height: 1;
}
</style>
</head>
<body>

<!-- ═══ PRINCIPAL — negro ═══ -->
<div class="label">Marca principal — fondo negro</div>
<div class="card-black">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-w">Finest</span>
    </div>
    <span class="detailing-w">Detailing</span>
  </div>
</div>

<!-- ═══ NAVY ═══ -->
<div class="label" style="margin-top:16px;">Fondo navy</div>
<div class="card-navy">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-w">Finest</span>
    </div>
    <span class="detailing-w">Detailing</span>
  </div>
</div>

<!-- ═══ CLARO ═══ -->
<div class="label" style="margin-top:16px;">Fondo claro</div>
<div class="card-light">
  <div class="logo">
    <div class="line1">
      <span class="coastal-d">Coastal&nbsp;</span><span class="finest-d">Finest</span>
    </div>
    <span class="detailing-d">Detailing</span>
  </div>
</div>

<!-- ═══ COMPACTA ═══ -->
<div class="label" style="margin-top:16px;">Versión compacta — navbar, firma de email</div>
<div class="card-black" style="padding: 48px 80px; justify-content: flex-start;">
  <div class="logo-compact">
    <div class="compact-left">
      <span class="compact-coastal">Coastal</span>
      <span class="compact-finest">Finest</span>
    </div>
    <div class="compact-vline"></div>
    <span class="compact-detailing">Detailing</span>
  </div>
</div>

<!-- ═══ MONOGRAMA CF — reglas horizontales ═══ -->
<div class="label" style="margin-top:16px;">Monograma CF — favicon, redes sociales, uniformes</div>
<div class="card-mono-row">
  <div class="mono-card">
    <div class="monogram-wrap">
      <div class="mono-rule"></div>
      <span class="mono-cf">CF</span>
      <div class="mono-rule"></div>
    </div>
  </div>
  <div class="mono-card navy">
    <div class="monogram-wrap">
      <div class="mono-rule"></div>
      <span class="mono-cf">CF</span>
      <div class="mono-rule"></div>
    </div>
  </div>
  <div class="mono-card light">
    <div class="monogram-wrap">
      <div class="mono-rule-dark"></div>
      <span class="mono-cf-dark">CF</span>
      <div class="mono-rule-dark"></div>
    </div>
  </div>
</div>

</body>
</html>
