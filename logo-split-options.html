<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest — Split Layout Options</title>
<style>
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2'); font-weight: 600; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Regular.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2'); font-weight: 300; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2'); font-weight: 200; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060C18;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  font-family: 'Clash Display', sans-serif;
}
.label {
  font-size: 9px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
  color: #3A5070; padding: 10px 0 4px; width: 900px;
}
.card {
  width: 900px; background: #000000;
  display: flex; align-items: center; justify-content: center;
  padding: 64px 72px;
}

/* ─── DIVISOR VERTICAL ─── */
.vline {
  width: 1px;
  background: #FFFFFF;
  align-self: stretch;
  margin: 0 32px;
  flex-shrink: 0;
}

/* ─────────────── OPCIÓN 0 (tu referencia) ─────────────── */
/* Coastal/Finest pequeño · Detailing enorme */
.o0-left {
  display: flex; flex-direction: column; align-items: flex-start;
  justify-content: center;
}
.o0-left span {
  font-family: 'Clash Display'; font-weight: 300; font-size: 38px;
  letter-spacing: -0.5px; color: #FFFFFF; line-height: 1.1;
}
.o0-right {
  font-family: 'Clash Display'; font-weight: 700; font-size: 100px;
  letter-spacing: -3px; color: #FFFFFF; line-height: 1;
}

/* ─────────────── OPCIÓN 1 ─────────────── */
/* Tamaños equilibrados — ninguna palabra domina */
.o1-left {
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
}
.o1-coastal {
  font-family: 'Clash Display'; font-weight: 200; font-size: 18px;
  letter-spacing: 4px; text-transform: uppercase; color: rgba(255,255,255,0.4);
  margin-bottom: 4px;
}
.o1-finest {
  font-family: 'Clash Display'; font-weight: 600; font-size: 72px;
  letter-spacing: -2px; color: #FFFFFF; line-height: 1;
}
.o1-right {
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
}
.o1-detailing {
  font-family: 'Clash Display'; font-weight: 300; font-size: 72px;
  letter-spacing: -2px; color: #FFFFFF; line-height: 1;
}
.o1-sub {
  font-family: 'Clash Display'; font-weight: 200; font-size: 12px;
  letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.3);
  margin-top: 6px;
}

/* ─────────────── OPCIÓN 2 ─────────────── */
/* Coastal Finest GRANDE izquierda · Detailing pequeño derecha */
.o2-left {
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
}
.o2-coastal {
  font-family: 'Clash Display'; font-weight: 200; font-size: 16px;
  letter-spacing: 5px; text-transform: uppercase; color: rgba(255,255,255,0.35);
  margin-bottom: 4px;
}
.o2-finest {
  font-family: 'Clash Display'; font-weight: 600; font-size: 100px;
  letter-spacing: -3px; color: #FFFFFF; line-height: 1;
}
.o2-right {
  display: flex; flex-direction: column; align-items: flex-start; justify-content: center;
}
.o2-detailing {
  font-family: 'Clash Display'; font-weight: 300; font-size: 32px;
  letter-spacing: 1px; color: rgba(255,255,255,0.6); line-height: 1.2;
}
.o2-mobile {
  font-family: 'Clash Display'; font-weight: 200; font-size: 11px;
  letter-spacing: 3px; text-transform: uppercase; color: rgba(255,255,255,0.25);
  margin-top: 8px;
}
</style>
</head>
<body>

<!-- ─── REFERENCIA (tu mockup) ─── -->
<div class="label">Tu referencia — Detailing domina</div>
<div class="card">
  <div class="o0-left">
    <span>Coastal</span>
    <span>Finest</span>
  </div>
  <div class="vline"></div>
  <div class="o0-right">Detailing</div>
</div>

<!-- ─── OPCIÓN 1: Equilibrada ─── -->
<div class="label" style="margin-top:16px;">Opción 1 — Equilibrada · Finest y Detailing al mismo nivel</div>
<div class="card">
  <div class="o1-left">
    <span class="o1-coastal">Coastal</span>
    <span class="o1-finest">Finest</span>
  </div>
  <div class="vline"></div>
  <div class="o1-right">
    <span class="o1-detailing">Detailing</span>
    <span class="o1-sub">Mobile, Alabama</span>
  </div>
</div>

<!-- ─── OPCIÓN 2: Coastal Finest domina ─── -->
<div class="label" style="margin-top:16px;">Opción 2 — "Finest" domina · Detailing queda como descriptor</div>
<div class="card">
  <div class="o2-left">
    <span class="o2-coastal">Coastal</span>
    <span class="o2-finest">Finest</span>
  </div>
  <div class="vline"></div>
  <div class="o2-right">
    <span class="o2-detailing">Detail-<br>ing</span>
    <span class="o2-mobile">Mobile, AL</span>
  </div>
</div>

</body>
</html>
