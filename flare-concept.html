<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest — Flare Concept</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #080E18; font-family: 'DM Sans', sans-serif; color: #F2F0EB; padding: 48px 40px; }

  .header { margin-bottom: 40px; }
  .header-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #C9A84C; margin-bottom: 8px; }
  .header-title { font-size: 22px; font-weight: 300; }

  .section-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #444; margin-bottom: 8px; }

  .icon-section { margin-bottom: 40px; }
  .icon-wrap { background: #000; display: flex; align-items: center; justify-content: center; padding: 60px; max-width: 400px; }
  .icon-wrap img { width: 280px; height: 280px; object-fit: contain; }

  .logo-section { display: flex; flex-direction: column; gap: 3px; }
  .logo-card { background: #000; padding: 56px 64px; display: flex; align-items: center; justify-content: center; }
  .logo-card img { max-width: 100%; max-height: 120px; object-fit: contain; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Coastal Finest — Concepto Flare</div>
  <div class="header-title">Línea diagonal · Destello de luz · Estilo DALETON</div>
</div>

<div class="icon-section">
  <div class="section-label">Ícono solo</div>
  <div class="icon-wrap">
    <img src="09-icon-flare-A.png" alt="Icon flare">
  </div>
</div>

<div class="section-label" style="margin-bottom: 8px;">Logo horizontal — Variante A</div>
<div class="logo-section">
  <div class="logo-card">
    <img src="09-logo-horizontal-A.png" alt="Logo A">
  </div>
  <div class="logo-card">
    <img src="09-logo-horizontal-B.png" alt="Logo B">
  </div>
</div>

</body>
</html>
