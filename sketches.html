<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest — Sketches</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0B1628; font-family: 'DM Sans', sans-serif; color: #F2F0EB; padding: 48px 40px; }

  .header { margin-bottom: 48px; }
  .header-label { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #C9A84C; margin-bottom: 8px; }
  .header-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 300; margin-bottom: 6px; }
  .header-sub { font-size: 12px; color: #8BA3B8; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }

  .card { background: #0F1E35; }
  .card-img { background: #fff; padding: 40px; }
  .card-img img { width: 100%; display: block; }
  .card-info { padding: 20px 24px 24px; }
  .card-label { font-size: 9px; letter-spacing: 4px; text-transform: uppercase; color: #C9A84C; margin-bottom: 6px; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400; margin-bottom: 10px; }
  .card-wordmark {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #8BA3B8;
    background: #0B1628;
    padding: 12px 16px;
    letter-spacing: 1px;
    line-height: 1.8;
  }
  .card-wordmark span { color: #C9A84C; }
</style>
</head>
<body>

<div class="header">
  <div class="header-label">Coastal Finest — Sketches</div>
  <div class="header-title">Layout Variations — Antes de generar el logo final</div>
  <div class="header-sub">Sketch A: wordmark en una línea · Sketch B: wordmark en dos líneas mismo tamaño</div>
</div>

<div class="grid">

  <div class="card">
    <div class="card-img">
      <img src="sketch-A-one-line.png" alt="Sketch A">
    </div>
    <div class="card-info">
      <div class="card-label">Variante A</div>
      <div class="card-title">Una sola línea</div>
      <div class="card-wordmark">
        [ CFD emblem ]<br>
        <span>COASTAL FINEST DETAILING</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-img">
      <img src="sketch-B-two-lines.png" alt="Sketch B">
    </div>
    <div class="card-info">
      <div class="card-label">Variante B</div>
      <div class="card-title">Dos líneas, mismo tamaño</div>
      <div class="card-wordmark">
        [ CFD emblem ]<br>
        <span>COASTAL FINEST</span><br>
        <span>DETAILING</span>
      </div>
    </div>
  </div>

</div>

</body>
</html>
