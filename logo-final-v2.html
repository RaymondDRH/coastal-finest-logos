<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest Detailing — Final v2</title>
<style>
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2'); font-weight: 600; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Regular.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2'); font-weight: 300; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2'); font-weight: 200; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060C18;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  font-family: 'Clash Display', sans-serif;
}
.label {
  font-size: 9px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
  color: #3A5070; padding: 10px 0 4px; width: 900px;
}
.card-black { width: 900px; background: #000000; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }
.card-navy  { width: 900px; background: #080F1E; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }
.card-light { width: 900px; background: #F0EDE8; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }

/* ─── LOGO STRUCTURE ─── */
.logo {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  line-height: 1;
  gap: 0;
}

/* Line 1: Coastal [light] + Finest [bold] */
.line1 {
  display: flex;
  align-items: baseline;
  gap: 0;
  line-height: 1;
}
.coastal-w  { font-family: 'Clash Display'; font-weight: 300; font-size: 52px; letter-spacing: -1px; color: #FFFFFF; }
.finest-w   { font-family: 'Clash Display'; font-weight: 700; font-size: 52px; letter-spacing: -1px; color: #FFFFFF; }

/* Line 2: Detailing [light] grande */
.detailing-w { font-family: 'Clash Display'; font-weight: 300; font-size: 100px; letter-spacing: -3px; color: #FFFFFF; line-height: 0.9; }

/* Dark versions */
.coastal-d   { font-family: 'Clash Display'; font-weight: 300; font-size: 52px; letter-spacing: -1px; color: #080F1E; }
.finest-d    { font-family: 'Clash Display'; font-weight: 700; font-size: 52px; letter-spacing: -1px; color: #080F1E; }
.detailing-d { font-family: 'Clash Display'; font-weight: 300; font-size: 100px; letter-spacing: -3px; color: #080F1E; line-height: 0.9; }

/* Silver accent variant */
.finest-silver {
  font-family: 'Clash Display'; font-weight: 700; font-size: 52px; letter-spacing: -1px;
  background: linear-gradient(135deg, #EEF3F6 0%, #C4D0D8 40%, #E8F0F5 65%, #9AB0C0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.detailing-silver {
  font-family: 'Clash Display'; font-weight: 300; font-size: 100px; letter-spacing: -3px; line-height: 0.9;
  background: linear-gradient(135deg, #EEF3F6 0%, #C4D0D8 40%, #E8F0F5 65%, #9AB0C0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
</style>
</head>
<body>

<!-- NEGRO — BASE -->
<div class="label">Principal — fondo negro</div>
<div class="card-black">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-w">Finest</span>
    </div>
    <span class="detailing-w">Detailing</span>
  </div>
</div>

<!-- NEGRO — Finest plateado -->
<div class="label" style="margin-top:16px;">Variante — "Finest" en silver</div>
<div class="card-black">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-silver">Finest</span>
    </div>
    <span class="detailing-w">Detailing</span>
  </div>
</div>

<!-- NEGRO — Detailing plateado -->
<div class="label" style="margin-top:16px;">Variante — "Detailing" en silver</div>
<div class="card-black">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-w">Finest</span>
    </div>
    <span class="detailing-silver">Detailing</span>
  </div>
</div>

<!-- NAVY -->
<div class="label" style="margin-top:16px;">Fondo navy</div>
<div class="card-navy">
  <div class="logo">
    <div class="line1">
      <span class="coastal-w">Coastal&nbsp;</span><span class="finest-silver">Finest</span>
    </div>
    <span class="detailing-w">Detailing</span>
  </div>
</div>

<!-- CLARO -->
<div class="label" style="margin-top:16px;">Fondo claro</div>
<div class="card-light">
  <div class="logo">
    <div class="line1">
      <span class="coastal-d">Coastal&nbsp;</span><span class="finest-d">Finest</span>
    </div>
    <span class="detailing-d">Detailing</span>
  </div>
</div>

</body>
</html>
