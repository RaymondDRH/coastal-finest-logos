<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest Detailing — Final v1</title>
<style>
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2'); font-weight: 600; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Medium.woff2') format('woff2'); font-weight: 500; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Regular.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2'); font-weight: 300; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2'); font-weight: 200; }

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060C18;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  font-family: 'Clash Display', sans-serif;
}

.label {
  font-size: 9px; font-weight: 400; letter-spacing: 4px; text-transform: uppercase;
  color: #3A5070; padding: 10px 0 4px; width: 900px;
}

.card-black { width: 900px; background: #000000; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }
.card-navy  { width: 900px; background: #080F1E; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }
.card-light { width: 900px; background: #F0EDE8; display: flex; align-items: center; justify-content: center; padding: 72px 72px; }

.logo {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* "COASTAL" — se ajusta dinámicamente al ancho de FinestDetailing */
.coastal {
  font-family: 'Clash Display'; font-weight: 200; font-size: 13px;
  text-transform: uppercase; color: rgba(255,255,255,0.35);
  letter-spacing: 0.5em; /* fallback, JS lo ajusta */
  white-space: nowrap;
  margin-bottom: 4px;
  display: block;
}
.coastal-dark {
  font-family: 'Clash Display'; font-weight: 200; font-size: 13px;
  text-transform: uppercase; color: rgba(8,15,30,0.35);
  letter-spacing: 0.5em;
  white-space: nowrap;
  margin-bottom: 4px;
  display: block;
}

.main-line { display: flex; align-items: baseline; line-height: 1; }

.finest    { font-family: 'Clash Display'; font-weight: 300; font-size: 90px; letter-spacing: -2px; color: #FFFFFF; }
.detailing { font-family: 'Clash Display'; font-weight: 700; font-size: 90px; letter-spacing: -2px; color: #FFFFFF; }

.finest-dark    { font-family: 'Clash Display'; font-weight: 300; font-size: 90px; letter-spacing: -2px; color: #080F1E; }
.detailing-dark { font-family: 'Clash Display'; font-weight: 700; font-size: 90px; letter-spacing: -2px; color: #080F1E; }

/* versión con acento plateado en Detailing */
.detailing-silver {
  font-family: 'Clash Display'; font-weight: 700; font-size: 90px; letter-spacing: -2px;
  background: linear-gradient(135deg, #EEF3F6 0%, #C4D0D8 40%, #E8F0F5 65%, #9AB0C0 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
</style>
</head>
<body>

<!-- FONDO NEGRO — VERSION BASE -->
<div class="label">Principal — fondo negro</div>
<div class="card-black">
  <div class="logo">
    <span class="coastal" id="c1">COASTAL</span>
    <div class="main-line">
      <span class="finest" id="fd1">Finest</span><span class="detailing">Detailing</span>
    </div>
  </div>
</div>

<!-- FONDO NEGRO — DETAILING en plateado -->
<div class="label" style="margin-top:16px;">Variante plateada — "Detailing" en silver</div>
<div class="card-black">
  <div class="logo">
    <span class="coastal" id="c2">COASTAL</span>
    <div class="main-line">
      <span class="finest" id="fd2">Finest</span><span class="detailing-silver">Detailing</span>
    </div>
  </div>
</div>

<!-- FONDO NAVY -->
<div class="label" style="margin-top:16px;">Fondo navy</div>
<div class="card-navy">
  <div class="logo">
    <span class="coastal" id="c3">COASTAL</span>
    <div class="main-line">
      <span class="finest" id="fd3">Finest</span><span class="detailing-silver">Detailing</span>
    </div>
  </div>
</div>

<!-- FONDO CLARO -->
<div class="label" style="margin-top:16px;">Fondo claro — uso alternativo</div>
<div class="card-light">
  <div class="logo">
    <span class="coastal-dark" id="c4">COASTAL</span>
    <div class="main-line">
      <span class="finest-dark" id="fd4">Finest</span><span class="detailing-dark">Detailing</span>
    </div>
  </div>
</div>

<script>
// Ajusta letter-spacing de COASTAL para que coincida con el ancho de FinestDetailing
function matchWidth(coastalEl, mainLineEl) {
  const targetW = mainLineEl.getBoundingClientRect().width;
  const text = coastalEl.textContent;
  const chars = text.length;

  // Ajuste iterativo
  let lo = 0, hi = 30;
  for (let i = 0; i < 40; i++) {
    const mid = (lo + hi) / 2;
    coastalEl.style.letterSpacing = mid + 'px';
    const w = coastalEl.getBoundingClientRect().width;
    if (w < targetW) lo = mid;
    else hi = mid;
  }
}

window.addEventListener('load', () => {
  matchWidth(document.getElementById('c1'), document.getElementById('c1').nextElementSibling);
  matchWidth(document.getElementById('c2'), document.getElementById('c2').nextElementSibling);
  matchWidth(document.getElementById('c3'), document.getElementById('c3').nextElementSibling);
  matchWidth(document.getElementById('c4'), document.getElementById('c4').nextElementSibling);
});
</script>

</body>
</html>
