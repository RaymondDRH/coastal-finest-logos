<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest — Business Card v2</title>
<style>
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2'); font-weight: 700; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2'); font-weight: 600; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2'); font-weight: 300; }
@font-face { font-family: 'Clash Display'; src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2'); font-weight: 200; }

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 48px;
  padding: 80px 60px;
  font-family: 'Clash Display', sans-serif;
  min-height: 100vh;
}

/* 3.5" × 2" @ 150dpi × 2 = 1050 × 600 px */
.card {
  width: 1050px;
  height: 600px;
  position: relative;
  overflow: hidden;
  border-radius: 28px;
  flex-shrink: 0;
}

/* ─── FRENTE ─── */
#front { background: #000; }

.car-bg {
  position: absolute;
  inset: 0;
  background-image: url('cip/car-luxury.png');
  background-size: cover;
  background-position: center right;
  opacity: 0.9;
}

.car-mask {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    #000 0%,
    #000 32%,
    rgba(0,0,0,0.80) 50%,
    rgba(0,0,0,0.15) 72%,
    rgba(0,0,0,0) 100%
  );
}

.front-content {
  position: absolute;
  inset: 0;
  padding: 52px 68px 52px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

/* Logo */
.logo-lockup {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  line-height: 1;
}
.logo-line1  { display: flex; align-items: baseline; }
.l-coastal   { font-weight: 300; font-size: 37px; letter-spacing: -0.02em; color: #fff; }
.l-finest    { font-weight: 700; font-size: 37px; letter-spacing: -0.02em; color: #fff; }
.l-detailing { font-weight: 300; font-size: 64px; letter-spacing: -0.03em; color: #fff; line-height: 0.88; }

/* Bloque de contacto — abajo izquierda */
.front-contact {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.fc-name  {
  font-weight: 600; font-size: 26px; letter-spacing: -0.02em;
  color: #fff; margin-bottom: 5px;
}
.fc-title {
  font-weight: 200; font-size: 10px; letter-spacing: 3px;
  text-transform: uppercase; color: rgba(255,255,255,0.55);
  margin-bottom: 18px;
}
.fc-rule { width: 36px; height: 1px; background: rgba(196,208,216,0.4); margin-bottom: 16px; }
.fc-line {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 9px;
}
.fc-line:last-child { margin-bottom: 0; }
.fc-label {
  font-weight: 200; font-size: 11px; letter-spacing: 2.5px;
  text-transform: uppercase; color: #C4D0D8; width: 52px; flex-shrink: 0;
}
.fc-value {
  font-weight: 300; font-size: 15px; letter-spacing: 0.1px;
  color: rgba(255,255,255,0.85);
}

/* ─── DORSO ─── */
#back { background: #040404; }

/* QR centrado como hero */
.back-qr-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.qr-headline {
  font-weight: 600;
  font-size: 18px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: #fff;
}
.back-qr-wrap img {
  width: 200px;
  height: 200px;
  display: block;
  border-radius: 6px;
}
.qr-tagline {
  font-weight: 300;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.65);
}

/* Footer dorso */
.back-footer {
  position: absolute;
  bottom: 38px;
  left: 0; right: 0;
  text-align: center;
  font-weight: 200;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.12);
}
</style>
</head>
<body>

<!-- FRENTE -->
<div class="card" id="front">
  <div class="car-bg"></div>
  <div class="car-mask"></div>
  <div class="front-content">
    <div class="logo-lockup">
      <div class="logo-line1">
        <span class="l-coastal">Coastal&nbsp;</span><span class="l-finest">Finest</span>
      </div>
      <span class="l-detailing">Detailing</span>
    </div>
    <div class="front-contact">
      <div class="fc-name">Raymond Reyes</div>
      <div class="fc-title">Owner &amp; Operator</div>
      <div class="fc-rule"></div>
      <div class="fc-line">
        <span class="fc-label">Phone</span>
        <span class="fc-value">(251) 477-9029</span>
      </div>
      <div class="fc-line">
        <span class="fc-label">Email</span>
        <span class="fc-value">info@coastalfinest.com</span>
      </div>
      <div class="fc-line">
        <span class="fc-label">Web</span>
        <span class="fc-value">coastalfinest.com</span>
      </div>
    </div>
  </div>
</div>

  </div>

</div>

</body>
</html>
