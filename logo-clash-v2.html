<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest Detailing — Clash Display v2</title>
<style>
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Bold.woff2') format('woff2');
  font-weight: 700;
}
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Semibold.woff2') format('woff2');
  font-weight: 600;
}
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Medium.woff2') format('woff2');
  font-weight: 500;
}
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Regular.woff2') format('woff2');
  font-weight: 400;
}
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Light.woff2') format('woff2');
  font-weight: 300;
}
@font-face {
  font-family: 'Clash Display';
  src: url('fonts/clash-display/ClashDisplay-Extralight.woff2') format('woff2');
  font-weight: 200;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #060C18;
  padding: 48px 40px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  align-items: center;
  font-family: 'Clash Display', sans-serif;
}

.label {
  font-family: 'Clash Display', sans-serif;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #3A5070;
  padding: 10px 0 4px;
  width: 900px;
}

.card {
  width: 900px;
  background: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 72px 72px;
}

.logo {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  line-height: 1;
}

.eyebrow {
  font-family: 'Clash Display', sans-serif;
  font-weight: 300;
  font-size: 20px;
  letter-spacing: 0.5px;
  color: #FFFFFF;
  margin-bottom: 4px;
}

.main-line {
  display: flex;
  align-items: baseline;
  line-height: 1;
}

/* ─── Opción A: Light 300 + Semibold 600 ─── */
.a-finest   { font-family: 'Clash Display'; font-weight: 300; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }
.a-detailing{ font-family: 'Clash Display'; font-weight: 600; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }

/* ─── Opción B: Light 300 + Medium 500 ─── */
.b-finest   { font-family: 'Clash Display'; font-weight: 300; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }
.b-detailing{ font-family: 'Clash Display'; font-weight: 500; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }

/* ─── Opción C: Regular 400 + Semibold 600 ─── */
.c-finest   { font-family: 'Clash Display'; font-weight: 400; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }
.c-detailing{ font-family: 'Clash Display'; font-weight: 600; font-size: 84px; letter-spacing: -2px; color: #FFFFFF; }
</style>
</head>
<body>

<!-- ─── A: Light + Semibold ─── -->
<div class="label">A — Finest Light 300 · Detailing Semibold 600</div>
<div class="card">
  <div class="logo">
    <div class="eyebrow">Coastal</div>
    <div class="main-line">
      <span class="a-finest">Finest</span><span class="a-detailing">Detailing</span>
    </div>
  </div>
</div>

<!-- ─── B: Light + Medium ─── -->
<div class="label" style="margin-top:16px;">B — Finest Light 300 · Detailing Medium 500</div>
<div class="card">
  <div class="logo">
    <div class="eyebrow">Coastal</div>
    <div class="main-line">
      <span class="b-finest">Finest</span><span class="b-detailing">Detailing</span>
    </div>
  </div>
</div>

<!-- ─── C: Regular + Semibold ─── -->
<div class="label" style="margin-top:16px;">C — Finest Regular 400 · Detailing Semibold 600</div>
<div class="card">
  <div class="logo">
    <div class="eyebrow">Coastal</div>
    <div class="main-line">
      <span class="c-finest">Finest</span><span class="c-detailing">Detailing</span>
    </div>
  </div>
</div>

</body>
</html>
