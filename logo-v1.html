<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coastal Finest — Logo SVG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #060C18; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 3px; }

  .preview {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 100px;
  }
  .preview-dark { background: #0B1628; width: 900px; }
  .preview-light { background: #FFFFFF; width: 900px; }

  .label {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #333;
    padding: 8px 0;
    text-align: left;
    width: 900px;
  }
</style>
</head>
<body>

<div class="label">Dark background</div>
<div class="preview preview-dark">
  <svg width="680" height="100" viewBox="0 0 680 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Flare gradient along the diagonal line -->
      <linearGradient id="lineGrad" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="35%" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="65%" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <!-- Flare glow blur -->
      <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2.5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <!-- Horizontal flare ray -->
      <linearGradient id="rayH" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <!-- Vertical flare ray -->
      <linearGradient id="rayV" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <!-- ICON: diagonal line with flare -->
    <!-- Main diagonal line -->
    <line x1="10" y1="88" x2="78" y2="12"
          stroke="url(#lineGrad)" stroke-width="1.2"
          filter="url(#glow)"/>

    <!-- Flare center point (intersection at ~44,50) -->
    <!-- Horizontal ray -->
    <line x1="16" y1="50" x2="72" y2="50"
          stroke="url(#rayH)" stroke-width="0.6" opacity="0.7"/>
    <!-- Vertical ray -->
    <line x1="44" y1="20" x2="44" y2="80"
          stroke="url(#rayV)" stroke-width="0.6" opacity="0.7"/>

    <!-- Center bright dot -->
    <circle cx="44" cy="50" r="1.5" fill="#ffffff" opacity="0.9"/>
    <circle cx="44" cy="50" r="4" fill="#ffffff" opacity="0.15"/>
    <circle cx="44" cy="50" r="8" fill="#ffffff" opacity="0.05"/>

    <!-- WORDMARK -->
    <!-- COASTAL FINEST -->
    <text x="110" y="48"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-size="32"
          font-weight="700"
          letter-spacing="6"
          fill="#FFFFFF">COASTAL FINEST</text>

    <!-- Thin separator line -->
    <line x1="110" y1="58" x2="668" y2="58"
          stroke="#C9A84C" stroke-width="0.6" opacity="0.5"/>

    <!-- DETAILING -->
    <text x="110" y="82"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="12"
          fill="#FFFFFF">DETAILING</text>
  </svg>
</div>

<div class="label" style="margin-top: 16px;">White background</div>
<div class="preview preview-light">
  <svg width="680" height="100" viewBox="0 0 680 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lineGrad2" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#0B1628" stop-opacity="0"/>
        <stop offset="35%" stop-color="#0B1628" stop-opacity="0.5"/>
        <stop offset="50%" stop-color="#0B1628" stop-opacity="1"/>
        <stop offset="65%" stop-color="#0B1628" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#0B1628" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow2" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="1.5" result="blur"/>
        <feMerge>
          <feMergeNode in="blur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <linearGradient id="rayH2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#0B1628" stop-opacity="0"/>
        <stop offset="50%" stop-color="#0B1628" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#0B1628" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="rayV2" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#0B1628" stop-opacity="0"/>
        <stop offset="50%" stop-color="#0B1628" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#0B1628" stop-opacity="0"/>
      </linearGradient>
    </defs>

    <line x1="10" y1="88" x2="78" y2="12"
          stroke="url(#lineGrad2)" stroke-width="1.2"
          filter="url(#glow2)"/>
    <line x1="16" y1="50" x2="72" y2="50"
          stroke="url(#rayH2)" stroke-width="0.6" opacity="0.6"/>
    <line x1="44" y1="20" x2="44" y2="80"
          stroke="url(#rayV2)" stroke-width="0.6" opacity="0.6"/>
    <circle cx="44" cy="50" r="1.5" fill="#0B1628" opacity="0.9"/>
    <circle cx="44" cy="50" r="4" fill="#0B1628" opacity="0.1"/>

    <text x="110" y="48"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-size="32"
          font-weight="700"
          letter-spacing="6"
          fill="#0B1628">COASTAL FINEST</text>

    <line x1="110" y1="58" x2="668" y2="58"
          stroke="#C9A84C" stroke-width="0.6" opacity="0.7"/>

    <text x="110" y="82"
          font-family="'Arial', 'Helvetica Neue', sans-serif"
          font-size="18"
          font-weight="700"
          letter-spacing="12"
          fill="#0B1628">DETAILING</text>
  </svg>
</div>

<!-- Icon only -->
<div class="label" style="margin-top: 16px;">Ícono solo</div>
<div class="preview preview-dark" style="width: 200px; padding: 40px;">
  <svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="lineGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="35%" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="1"/>
        <stop offset="65%" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <filter id="glow3">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <linearGradient id="rH3" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <linearGradient id="rV3" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="50%" stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="8" y1="72" x2="72" y2="8" stroke="url(#lineGrad3)" stroke-width="1.2" filter="url(#glow3)"/>
    <line x1="10" y1="40" x2="70" y2="40" stroke="url(#rH3)" stroke-width="0.8" opacity="0.8"/>
    <line x1="40" y1="10" x2="40" y2="70" stroke="url(#rV3)" stroke-width="0.8" opacity="0.8"/>
    <circle cx="40" cy="40" r="1.8" fill="#ffffff"/>
    <circle cx="40" cy="40" r="5" fill="#ffffff" opacity="0.12"/>
    <circle cx="40" cy="40" r="10" fill="#ffffff" opacity="0.04"/>
  </svg>
</div>

</body>
</html>
